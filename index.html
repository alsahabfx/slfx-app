<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLFX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: #fff;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-around;
    background: #111;
    padding: 15px;
    position: fixed;
    bottom: 0;
    width: 100%;
    border-top: 1px solid #222;
}

.nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
}

.logo {
    color: gold;
    font-size: 35px;
}

/* CARD */
.card {
    background: #111;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
}

/* SIGNAL */
.signal {
    background: #151515;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

.buy { color: #00ff88; }
.sell { color: red; }

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    margin: 20px;
    padding: 15px;
    background: gold;
    color: black;
    border-radius: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SLFX</div>
    <div>Smart Liquidity FX</div>
</div>

<div class="card">
    <h3>📊 نظرة السوق</h3>
    <p style="color:#00ff88;">صاعد (BULLISH)</p>
</div>

<div class="card">
    <h3>📈 شارت الذهب</h3>
    <div id="tradingview_gold"></div>
</div>

<div class="card">
    <h3>🔥 التوصيات</h3>

    <div class="signal">
        XAUUSD - <span class="buy">BUY</span><br>
        Entry: 2357<br> SL: 2346<br> TP: 2368
    </div>

    <div class="signal">
        XAUUSD - <span class="sell">SELL</span><br>
        Entry: 2425<br> SL: 2436<br> TP: 2415
    </div>
</div>

<a class="btn" href="https://wa.me/96597141338">
    اشترك VIP
</a>

<div class="nav">
    <a href="#">الرئيسية</a>
    <a href="#">التوصيات</a>
    <a href="#">التنبيهات</a>
    <a href="#">حسابي</a>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width": "100%",
  "height": 300,
  "symbol": "OANDA:XAUUSD",
  "interval": "15",
  "theme": "dark",
  "container_id": "tradingview_gold"
});
</script>

</body>
</html>
