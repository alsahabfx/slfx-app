<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLFX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #222;
}
.logo {
  font-size: 22px;
  font-weight: bold;
}
.nav a {
  color: #aaa;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}
.hero h1 {
  font-size: 60px;
}
.hero p {
  color: #aaa;
  margin-top: 10px;
}
.btn {
  margin-top: 30px;
  display: inline-block;
  padding: 12px 30px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 5px;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  text-align: center;
}
.card {
  background: #111;
  border: 1px solid #222;
  padding: 20px;
  margin: 10px;
  display: inline-block;
  width: 250px;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #666;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">SLFX</div>
  <div>
    <a href="#">الرئيسية</a>

  </div>
</div>

<div class="hero">

  <p>نقرأ السيولة… ونسبق الحركة</p>
  <a class="btn" href="#">ادخل التحليلات</a>
</div>

<!-- SECTION -->
<div class="section">
  <h2>أحدث التحليلات</h2>

  <div class="card">
    <h3>تحليل الذهب</h3>
    <p>مناطق سيولة قوية حول 4700</p>
  </div>

  <div class="card">
    <h3>السيناريو القادم</h3>
    <p>كسر القاع = تسارع بيعي</p>
  </div>

  <div class="card">
    <h3>فلسفة SLFX</h3>
    <p>لا تتبع الشموع… اتبع السيولة</p>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © SLFX - جميع الحقوق محفوظة
</div>

</html>
